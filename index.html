<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Vitor Rosa Developer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=Press+Start+2P&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/components/main-header.css">
    <link rel="stylesheet" href="css/components/main-banner.css">
    <link rel="stylesheet" href="css/components/main-title.css">
    <link rel="stylesheet" href="css/components/subtitle.css">
    <link rel="stylesheet" href="css/components/main-box.css">
    <link rel="stylesheet" href="css/components/main-button.css">
    <link rel="stylesheet" href="css/components/main-action.css">
    <link rel="stylesheet" href="css/components/section.css">
    <link rel="stylesheet" href="css/components/skill-tec.css">
    <link rel="stylesheet" href="css/components/wrapper-skill.css">
    <link rel="stylesheet" href="css/components/progress-bar.css">
    <link rel="stylesheet" href="css/components/card-project.css">
    <link rel="stylesheet" href="css/components/wrapper-card.css">
</head>

<body>
    <header class="main-header">
        <img src="assets/img/Logo Curriculo.png" alt="Logo">

        <nav class="nav">
            <a class="main-action" href="" lang="en">Skills</a>
            <a class="main-action" href="">Projetos</a>
            <a class="main-action" href="">Sobre</a>
            <a class="main-action" href="">Contatos</a>
            <a class="main-button" href="" lang="en">Download CV</a>
        </nav>
    </header>

    <section class="main-banner">
        <div class="wrapper">
            <div class="main-box">
                <h1 class="main-title">Vitor Rosa</h1>
                <h2 class="subtitle">Developer</h2>
            </div>
            <div class="navigation">
                <a class="main-button" href="" lang="en">Download CV</a>
                <a class="main-button" href="">Contatos</a>
            </div>
        </div>
    </section>

    <section class="section">
        <h2 class="main-title -second">Skills</h2>

        <div class="wrapper-skill">
            <article class="skill-tec">
                <img class="icon" src="./img/ico_html5.png" alt="Logo do HTML5 em pixelart">
                <div class="right">
                    <h3 class="title">HTML</h3>
                    <progress class="progress-bar" max="100" value="30">
                        30%
                    </progress>
                </div>
            </article>
            <article class="skill-tec">
                <img class="icon" src="./img/ico_react.png" alt="Logo do React em pixelart">
                <div class="right">
                    <h3 class="title">React</h3>
                    <progress class="progress-bar" max="100" value="5">
                        5%
                    </progress>
                </div>
            </article>
            <article class="skill-tec">
                <img class="icon" src="./img/ico_css3.png" alt="Logo do CSS3 em pixelart">
                <div class="right">
                    <h3 class="title">CSS</h3>
                    <progress class="progress-bar" max="100" value="25">
                        5%
                    </progress>
                </div>
            </article>
            <article class="skill-tec">
                <img class="icon" src="./img/ico_nodejs.png" alt="Logo do NodeJS em pixelart">
                <div class="right">
                    <h3 class="title">NodeJS</h3>
                    <progress class="progress-bar" max="100" value="5">
                        5%
                    </progress>
                </div>
            </article>
            <article class="skill-tec">
                <img class="icon" src="./img/ico_js.png" alt="Logo do JavaScript em pixelart">
                <div class="right">
                    <h3 class="title">JavaScript</h3>
                    <progress class="progress-bar" max="100" value="12">
                        12%
                    </progress>
                </div>
            </article>
            <article class="skill-tec">
                <img class="icon" src="./img/ico_tdd.png" alt="Logo do TDD em pixelart">
                <div class="right">
                    <h3 class="title">TDD</h3>
                    <progress class="progress-bar" max="100" value="5">
                        5%
                    </progress>
                </div>
            </article>
        </div>
    </section>
    <section class="section -bgBlack -bdFirst">
        <h2 class="main-title -second">Projetos</h2>

        <div class="wrapper-card">
            <a href="https://vitorrosadev.github.io/x-devs-project" target="_blank">
                <figure class="card-project">
                    <img class="logo" src="img/logo-xdevs.png" alt="Logo x-devs project">
                </figure>
            </a>
            <a href="https://github.com/VitorRosaDev" target="_blank">
                <figure class="card-project">
                    <img class="logo" src="img/logo-github.png" alt="Logo github">
                </figure>
            </a>
            <a href="https://vitorrosadev.github.io">
                <figure class="card-project">
                    <img class="logo" src="img/logo-portfolio.png" alt="Logo portfolio">
                </figure>
            </a>
        </div>

    </section>
</body>

</html>
